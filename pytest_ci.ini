[pytest]
# Configuration for CI - runs all tests including slow ones
addopts = 
    -v --durations=20
    --tb=short
    --cov=src --cov-report=xml:coverage.xml --cov-report=term
    -rA  # Show extra test summary for all tests
    --verbose  # More verbose output
    --showlocals  # Show local variables in tracebacks
    --color=yes  # Enable colors for better readability
    --capture=no  # Show all output immediately

# Mark slow tests for reference  
markers =
    slow: marks tests as slow (deselect with '-m not slow')

# Additional reporting
addopts = --report-log=pytest_report.log

# CI-specific settings
[pytest]
console_output_style = progress  # Show progress style output
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Plugin configuration
[tool.pytest.ini_options]
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %H:%M:%S